# Lorelei runtime config for the merged flux-server deployment.
#
# There is no platform-default chat provider — Lorelei only ever runs with a BYO
# OpenAI/Anthropic credential, supplied per-request via `lorelei-bridge`'s dynamic
# `provider_override` (constructed from the org owner's or DM sender's resolved
# credential; see `crates/lorelei-bridge/src/resolve.rs`). `default_provider` below is
# never used by a real chat run — every real run sends a `provider_override` — but
# `ProviderRegistry::from_config` still needs *some* statically configured default to
# boot, so it points at `mock`, which is always registered and needs no real API key.
#
# `default_embedding_provider` is also `mock`: there's currently no real embedding
# provider configured (Anthropic has no embeddings API; wiring OpenAI embeddings for
# this is a separate, not-yet-requested feature), so Lorelei's memory/retrieval feature
# produces placeholder vectors rather than real ones until that's added.

[agent]
tenant_id = "00000000-0000-0000-0000-000000000000"
agent_id = "00000000-0000-0000-0000-000000000000"
default_provider = "mock"
default_embedding_provider = "mock"

[harbor]
host = "0.0.0.0"
port = 8080

[lore]
postgres_url_env = "DATABASE_URL"
qdrant_url_env = "QDRANT_URL"
collection = "lorelei_ollama"

[echo]
top_k = 20
rerank_top_k = 10
min_confidence = 0.25

[siren]
require_approval_for_high_risk = true
allow_shell_execution = true
allow_network_tools = false

[docs]
# Document ingestion is disabled for the FLUX integration's v1 (no corpus to bundle yet).
allowed_dirs = []

[providers.mock]
kind = "mock"
base_url = "http://127.0.0.1:0"
api_key_env = "LORELEI_MOCK_API_KEY"
chat_model = "mock-chat"
embedding_model = "mock-embed"
