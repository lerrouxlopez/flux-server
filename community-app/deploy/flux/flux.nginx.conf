# /etc/nginx/sites-available/flux
server {
  server_name flux.kineticapp.online;

  location / {
    proxy_pass http://127.0.0.1:8012;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  listen 443 ssl; # managed by Certbot
  ssl_certificate /etc/letsencrypt/live/flux.kineticapp.online/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/flux.kineticapp.online/privkey.pem; # managed by Certbot
  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
  if ($host = flux.kineticapp.online) { return 301 https://$host$request_uri; } # managed by Certbot
  server_name flux.kineticapp.online;
  listen 80;
  return 404; # managed by Certbot
}

