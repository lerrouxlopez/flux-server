services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: community_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d community_app"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  adminer:
    image: adminer:4
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8082:8080"

  nats:
    image: nats:2
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  livekit:
    image: livekit/livekit-server:latest
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant image doesn't include curl/wget; use a bash TCP probe instead.
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: curlimages/curl:8.12.1
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    # Pulls the small default chat + embedding models so Lorelei works out-of-the-box.
    # Slow on first run; cached in the ollama_data volume afterward.
    command:
      [
        "sh",
        "-lc",
        "curl -fsS http://ollama:11434/api/pull -H 'Content-Type: application/json' -d '{\"name\":\"llama3.2:3b\"}' && curl -fsS http://ollama:11434/api/pull -H 'Content-Type: application/json' -d '{\"name\":\"nomic-embed-text\"}'",
      ]

  lorelei-migrate:
    build:
      context: .
      dockerfile: Dockerfile.lorelei-harbor
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://app:app@postgres:5432/community_app?options=-c%20search_path%3Dlorelei"
      QDRANT_URL: http://qdrant:6334
      LORELEI_MOCK_API_KEY: dev-mock-key
      LORELEI_LOCAL_API_KEY: dev-local-key
      RUST_LOG: info
    command: ["lorelei-harbor", "migrate"]

  lorelei-harbor:
    build:
      context: .
      dockerfile: Dockerfile.lorelei-harbor
    depends_on:
      lorelei-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://app:app@postgres:5432/community_app?options=-c%20search_path%3Dlorelei"
      QDRANT_URL: http://qdrant:6334
      LORELEI_MOCK_API_KEY: dev-mock-key
      LORELEI_LOCAL_API_KEY: dev-local-key
      RUST_LOG: info
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 12

  lorelei-worker:
    build:
      context: .
      dockerfile: Dockerfile.lorelei-harbor
    depends_on:
      lorelei-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://app:app@postgres:5432/community_app?options=-c%20search_path%3Dlorelei"
      QDRANT_URL: http://qdrant:6334
      LORELEI_MOCK_API_KEY: dev-mock-key
      LORELEI_LOCAL_API_KEY: dev-local-key
      RUST_LOG: info
    command: ["lorelei-harbor", "worker"]

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    depends_on:
      - postgres
      - redis
      - nats
      - livekit
      - lorelei-harbor
    environment:
      APP_ENV: local
      HTTP_ADDR: 0.0.0.0:8080
      WS_ADDR: 0.0.0.0:8081
      DATABASE_URL: postgres://app:app@postgres:5432/community_app
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_SECONDS: 2592000
      LIVEKIT_URL_INTERNAL: http://livekit:7880
      LIVEKIT_URL_PUBLIC: http://localhost:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LORELEI_HARBOR_URL: http://lorelei-harbor:8080
      LORELEI_CREDENTIALS_KEY: "FiMHXZiC2EetxD2ZHiOBf4vDhkcuG9goO0/06fKR5gQ=" # dev only, rotate for real deployments
    ports:
      - "8080:8080"

  realtime-gateway:
    build:
      context: .
      dockerfile: Dockerfile.realtime-gateway
    depends_on:
      - postgres
      - redis
      - nats
    environment:
      APP_ENV: local
      WS_ADDR: 0.0.0.0:8081
      DATABASE_URL: postgres://app:app@postgres:5432/community_app
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_SECONDS: 2592000
      LIVEKIT_URL_INTERNAL: http://livekit:7880
      LIVEKIT_URL_PUBLIC: http://localhost:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
    ports:
      - "8081:8081"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - postgres
      - redis
      - nats
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://app:app@postgres:5432/community_app
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_SECONDS: 2592000
      LIVEKIT_URL_INTERNAL: http://livekit:7880
      LIVEKIT_URL_PUBLIC: http://localhost:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api-server
      - realtime-gateway
    environment:
      VITE_API_TARGET: http://api-server:8080
      VITE_REALTIME_TARGET: http://realtime-gateway:8081
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
