services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: community
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  livekit:
    image: livekit/livekit-server:v1.7
    command: ["--dev", "--bind", "0.0.0.0"]
    environment:
      LIVEKIT_KEYS: "devkey:devsecret"
    ports:
      - "7880:7880"   # HTTP
      - "7881:7881"   # WebRTC UDP/TCP (dev; keep open if needed)
      - "7882:7882/udp"

volumes:
  pgdata: {}

