name: Deploy (Flux)
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Check deploy secrets
        shell: bash
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "Missing SERVER_HOST" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "Missing SERVER_USER" && exit 1)
          test -n "${{ secrets.SERVER_SSH_KEY }}" || (echo "Missing SERVER_SSH_KEY" && exit 1)

      - name: Set image names
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_API=ghcr.io/${OWNER}/flux-api-server" >> "$GITHUB_ENV"
          echo "IMAGE_REALTIME=ghcr.io/${OWNER}/flux-realtime-gateway" >> "$GITHUB_ENV"
          echo "IMAGE_WORKER=ghcr.io/${OWNER}/flux-worker" >> "$GITHUB_ENV"
          echo "IMAGE_WEB=ghcr.io/${OWNER}/flux-web" >> "$GITHUB_ENV"
          echo "IMAGE_HARBOR=ghcr.io/${OWNER}/flux-lorelei-harbor" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (api-server)
        uses: docker/build-push-action@v6
        with:
          context: community-app
          file: community-app/Dockerfile.api-server
          push: true
          tags: ${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (realtime-gateway)
        uses: docker/build-push-action@v6
        with:
          context: community-app
          file: community-app/Dockerfile.realtime-gateway
          push: true
          tags: ${{ env.IMAGE_REALTIME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (worker)
        uses: docker/build-push-action@v6
        with:
          context: community-app
          file: community-app/Dockerfile.worker
          push: true
          tags: ${{ env.IMAGE_WORKER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (lorelei-harbor)
        uses: docker/build-push-action@v6
        with:
          context: community-app
          file: community-app/Dockerfile.lorelei-harbor
          push: true
          tags: ${{ env.IMAGE_HARBOR }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (web)
        uses: docker/build-push-action@v6
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: community-app
          file: community-app/Dockerfile.web-prod
          push: true
          tags: ${{ env.IMAGE_WEB }}:latest
          build-args: |
            VITE_BACKEND_ORIGIN=${{ secrets.FLUX_BACKEND_ORIGIN || 'https://fluxserver.kineticapp.online' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          FLUX_ENV_FILE: ${{ secrets.FLUX_ENV_FILE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: FLUX_ENV_FILE
          script: |
            cd /opt/flux
            # Keep the server's compose file in sync with the repo deployment scheme.
            cat > docker-compose.yml <<'COMPOSE'
            services:
              postgres:
                image: postgres:16
                restart: unless-stopped
                environment:
                  POSTGRES_USER: app
                  POSTGRES_PASSWORD: app
                  POSTGRES_DB: community_app
                volumes:
                  - /opt/flux/data/postgres:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U app -d community_app"]
                  interval: 5s
                  timeout: 5s
                  retries: 12

              qdrant:
                image: qdrant/qdrant:v1.18.0
                restart: unless-stopped
                volumes:
                  - /opt/flux/data/qdrant:/qdrant/storage
                healthcheck:
                  # qdrant image doesn't include curl/wget; use a bash TCP probe instead.
                  test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
                  interval: 5s
                  timeout: 5s
                  retries: 12

              lorelei-schema:
                image: postgres:16
                depends_on:
                  postgres:
                    condition: service_healthy
                environment:
                  PGPASSWORD: app
                entrypoint:
                  [
                    "psql",
                    "-h", "postgres",
                    "-U", "app",
                    "-d", "community_app",
                    "-c", "create schema if not exists lorelei; grant all on schema lorelei to app;",
                  ]

              lorelei-migrate:
                image: ghcr.io/lerrouxlopez/flux-lorelei-harbor:latest
                depends_on:
                  lorelei-schema:
                    condition: service_completed_successfully
                  qdrant:
                    condition: service_healthy
                environment:
                  DATABASE_URL: "postgres://app:app@postgres:5432/community_app?options=-c%20search_path%3Dlorelei"
                  QDRANT_URL: http://qdrant:6334
                  # Never used for real auth -- the static "mock" provider in lorelei.toml
                  # ignores it, since every real run sends a per-request provider_override.
                  LORELEI_MOCK_API_KEY: unused-mock-key
                command: ["lorelei-harbor", "migrate"]

              lorelei-harbor:
                image: ghcr.io/lerrouxlopez/flux-lorelei-harbor:latest
                restart: unless-stopped
                depends_on:
                  lorelei-migrate:
                    condition: service_completed_successfully
                environment:
                  DATABASE_URL: "postgres://app:app@postgres:5432/community_app?options=-c%20search_path%3Dlorelei"
                  QDRANT_URL: http://qdrant:6334
                  LORELEI_MOCK_API_KEY: unused-mock-key
                # Lets "host.docker.internal" (the base_url api-server forwards in each
                # provider_override) resolve to this host's lorelei-brains (Ollama) systemd
                # service. NOTE: deliberately NOT using the "host-gateway" magic value here
                # -- verified on this host that it resolves to docker0's gateway (172.17.0.1),
                # not this compose project's "flux_default" network gateway, because this
                # host runs multiple bridge networks. Pinned to the literal gateway IP that
                # lorelei-brains' systemd unit (OLLAMA_HOST) actually binds to instead. If the
                # "flux_default" network is ever recreated with a different subnet, this
                # (and lorelei-brains.service's OLLAMA_HOST on the VPS) both need updating.
                extra_hosts:
                  - "host.docker.internal:172.20.0.1"
                ports:
                  - "127.0.0.1:8013:8080"
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
                  interval: 5s
                  timeout: 5s
                  retries: 12

              lorelei-worker:
                image: ghcr.io/lerrouxlopez/flux-lorelei-harbor:latest
                restart: unless-stopped
                depends_on:
                  lorelei-migrate:
                    condition: service_completed_successfully
                environment:
                  DATABASE_URL: "postgres://app:app@postgres:5432/community_app?options=-c%20search_path%3Dlorelei"
                  QDRANT_URL: http://qdrant:6334
                  LORELEI_MOCK_API_KEY: unused-mock-key
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                command: ["lorelei-harbor", "worker"]

              redis:
                image: redis:7
                restart: unless-stopped

              nats:
                image: nats:2
                restart: unless-stopped
                command: ["-js"]

              livekit:
                image: livekit/livekit-server:latest
                restart: unless-stopped
                command: ["--config", "/etc/livekit.yaml"]
                volumes:
                  - /opt/flux/livekit/livekit.yaml:/etc/livekit.yaml:ro
                ports:
                  # Signal/HTTP is reverse-proxied by nginx (fluxserver.kineticapp.online)
                  - "127.0.0.1:7880:7880"
                  # UDP media must be reachable publicly (Cloudflare must be DNS-only for fluxserver)
                  - "7882:7882/udp"

              api-server:
                image: ghcr.io/lerrouxlopez/flux-api-server:latest
                restart: unless-stopped
                depends_on:
                  - postgres
                  - redis
                  - nats
                  - livekit
                env_file:
                  - /opt/flux/.env
                environment:
                  HTTP_ADDR: 0.0.0.0:8080
                  DATABASE_URL: postgres://app:app@postgres:5432/community_app
                  REDIS_URL: redis://redis:6379
                  NATS_URL: nats://nats:4222
                  LIVEKIT_URL_INTERNAL: http://livekit:7880
                  LORELEI_HARBOR_URL: http://lorelei-harbor:8080
                  # This value is only ever read here and forwarded as a string inside the
                  # provider_override sent to lorelei-harbor -- it's *harbor's* container
                  # (not api-server's) that actually dials it, so the matching extra_hosts
                  # entry lives on the lorelei-harbor/lorelei-worker services below, not here.
                  # LORELEI_CREDENTIALS_KEY comes from FLUX_ENV_FILE (see /opt/flux/.env via
                  # env_file above), not hardcoded here.
                  LORELEI_OLLAMA_BASE_URL: http://host.docker.internal:11434
                ports:
                  - "127.0.0.1:8010:8080"

              realtime-gateway:
                image: ghcr.io/lerrouxlopez/flux-realtime-gateway:latest
                restart: unless-stopped
                depends_on:
                  - postgres
                  - redis
                  - nats
                env_file:
                  - /opt/flux/.env
                environment:
                  WS_ADDR: 0.0.0.0:8081
                  DATABASE_URL: postgres://app:app@postgres:5432/community_app
                  REDIS_URL: redis://redis:6379
                  NATS_URL: nats://nats:4222
                  LIVEKIT_URL_INTERNAL: http://livekit:7880
                ports:
                  - "127.0.0.1:8011:8081"

              worker:
                image: ghcr.io/lerrouxlopez/flux-worker:latest
                restart: unless-stopped
                depends_on:
                  - postgres
                  - redis
                  - nats
                env_file:
                  - /opt/flux/.env
                environment:
                  DATABASE_URL: postgres://app:app@postgres:5432/community_app
                  REDIS_URL: redis://redis:6379
                  NATS_URL: nats://nats:4222
                  LIVEKIT_URL_INTERNAL: http://livekit:7880

              web:
                image: ghcr.io/lerrouxlopez/flux-web:latest
                restart: unless-stopped
                ports:
                  - "127.0.0.1:8012:8080"
            COMPOSE

            if [ -n "$FLUX_ENV_FILE" ]; then
              umask 077
              printf "%s" "$FLUX_ENV_FILE" > .env
            elif [ ! -f .env ]; then
              echo "Missing FLUX_ENV_FILE secret and /opt/flux/.env does not exist"
              exit 1
            fi
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
            curl -fsS http://127.0.0.1:8010/healthz >/dev/null
            # Lorelei (harbor) is an optional integration -- routes that use it degrade
            # gracefully when it's unreachable (see LoreleiRuntime::None in api-server), so
            # a hiccup here is surfaced in the log rather than failing the whole deploy.
            curl -fsS http://127.0.0.1:8013/healthz >/dev/null || echo "WARNING: lorelei-harbor healthz check failed"
            docker image prune -f
